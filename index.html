<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertitore Euro-Yen</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="converter">
        <h2>Convertitore Valuta</h2>
        <div class="input-container">
            <label for="euro">Euro</label>
            <input type="number" id="euro" placeholder="Inserisci €">
        </div>
        <div class="input-container">
            <label for="yen">Yen</label>
            <input type="number" id="yen" placeholder="Inserisci ¥">
        </div>
        <button onclick="convertCurrency()">Converti</button>
        <p id="message"></p>
    </div>
</div>

<footer>
    <p>Euro to Yen</p>
</footer>

<script src="script.js"></script>
</body>
</html>
